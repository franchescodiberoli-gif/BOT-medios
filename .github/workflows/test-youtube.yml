name: Probar descarga de YouTube

# Prueba manual: descarga 2 videos públicos desde el runner (misma IP de
# datacenter y mismo setup que usa el bot). Útil para diagnosticar cuando
# YouTube vuelva a cambiar algo, sin tener que probar por Telegram.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Runtime de JS que yt-dlp necesita para las firmas de YouTube
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Servidor de PO Tokens
        run: |
          docker run -d --init --name bgutil-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:4416/ping > /dev/null; do sleep 2; done' \
            && echo "Servidor POT listo" || echo "::warning::Servidor POT no respondió"

      - name: Instalar dependencias
        run: |
          # ffmpeg: los formatos de YouTube vienen con video y audio separados
          # y sin ffmpeg la fusión aborta ("ffmpeg is not installed").
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -U "yt-dlp[default]" bgutil-ytdlp-pot-provider requests PySocks curl_cffi

      - name: Descargar videos de prueba
        env:
          # Mismas cookies que usa el bot: sin ellas YouTube veta muchos
          # videos desde IPs de datacenter ("Sign in to confirm...").
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python - <<'EOF'
          import logging, os
          logging.basicConfig(level=logging.INFO)
          from downloader import download_youtube

          # Videos poco "icónicos": los muy famosos (p.ej. "Me at the zoo")
          # los veta YouTube desde IPs de datacenter con "Sign in to confirm
          # you're not a bot", aunque el setup esté bien.
          pruebas = [
              ("https://www.youtube.com/watch?v=aqz-KE-bpKQ", "youtube_long"),
              ("https://www.youtube.com/watch?v=dQw4w9WgXcQ", "youtube_long"),
          ]
          fallas = 0
          for url, plataforma in pruebas:
              fp, info = download_youtube(url, plataforma)
              if fp and os.path.getsize(fp) > 10_000:
                  mb = os.path.getsize(fp) / (1024 * 1024)
                  print(f"OK  {url} -> {fp} ({mb:.1f} MB) titulo={(info or {}).get('title')!r}")
              else:
                  print(f"FALLO  {url}")
                  fallas += 1
          # Truena solo si TODOS fallan (YouTube roto de verdad); una falla
          # individual puede ser veto por video y se reporta como warning.
          if fallas == len(pruebas):
              raise SystemExit(1)
          if fallas:
              print(f"::warning::{fallas} de {len(pruebas)} videos fallaron (posible veto por video desde IP de datacenter)")
          raise SystemExit(0)
          EOF
